<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Property Rentals</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .header {
      background: linear-gradient(135deg, #185FA5 0%, #378ADD 100%);
      color: white;
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 { font-size: 24px; font-weight: 500; }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
    }
    
    .stat-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 500;
      color: #333;
    }
    
    .filters {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      border: 1px solid #e0e0e0;
    }
    
    select, input, button {
      padding: 10px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    
    button {
      background: #378ADD;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #185FA5;
    }
    
    button.secondary {
      background: white;
      color: #333;
      border: 1px solid #ddd;
    }
    
    button.secondary:hover {
      background: #f5f5f5;
    }
    
    .bookings-table {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    thead {
      background: #f9f9f9;
    }
    
    th {
      text-align: left;
      padding: 16px;
      font-weight: 500;
      font-size: 13px;
      color: #666;
      border-bottom: 1px solid #e0e0e0;
    }
    
    td {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    
    tr:hover {
      background: #fafafa;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-confirmed {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .status-pending {
      background: #fff3e0;
      color: #f57c00;
    }
    
    .status-cancelled {
      background: #ffebee;
      color: #c62828;
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    
    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }
    
    .sync-section {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      border: 1px solid #e0e0e0;
    }
    
    .sync-section h3 {
      font-size: 16px;
      margin-bottom: 1rem;
      font-weight: 500;
    }
    
    .sync-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #666;
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    
    .loading {
      text-align: center;
      padding: 2rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Property Rental Dashboard</h1>
        <p style="opacity: 0.9; font-size: 14px; margin-top: 4px;">Manage all bookings and calendars</p>
      </div>
      <button onclick="refreshData()">🔄 Refresh</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total bookings</div>
        <div class="stat-value" id="totalBookings">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This month</div>
        <div class="stat-value" id="monthBookings">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total revenue</div>
        <div class="stat-value" id="totalRevenue">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Upcoming check-ins</div>
        <div class="stat-value" id="upcomingCheckins">0</div>
      </div>
    </div>

    <div class="sync-section">
      <h3>Calendar Sync</h3>
      <div class="sync-buttons">
        <button class="secondary" onclick="syncAirbnb(1)">Sync Property 1 (Airbnb)</button>
        <button class="secondary" onclick="syncAirbnb(2)">Sync Property 2 (Airbnb)</button>
        <button class="secondary" onclick="syncAirbnb(3)">Sync Property 3 (Airbnb)</button>
        <button class="secondary" onclick="syncAllAirbnb()">Sync All Properties</button>
      </div>
      <p style="margin-top: 1rem; font-size: 13px; color: #666;">
        Last synced: <span id="lastSync">Never</span>
      </p>
    </div>

    <div class="filters">
      <select id="statusFilter" onchange="filterBookings()">
        <option value="all">All statuses</option>
        <option value="confirmed">Confirmed</option>
        <option value="pending">Pending</option>
        <option value="cancelled">Cancelled</option>
      </select>
      
      <select id="propertyFilter" onchange="filterBookings()">
        <option value="all">All properties</option>
      </select>
      
      <input type="date" id="dateFilter" onchange="filterBookings()" placeholder="Filter by date">
      
      <input type="text" id="searchFilter" onchange="filterBookings()" placeholder="Search guest name...">
      
      <button class="secondary" onclick="exportToCSV()">📥 Export CSV</button>
    </div>

    <div class="bookings-table">
      <table>
        <thead>
          <tr>
            <th>Booking ID</th>
            <th>Property</th>
            <th>Guest</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Guests</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Source</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bookingsBody">
          <tr>
            <td colspan="10" class="loading">Loading bookings...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    let allBookings = [];
    let filteredBookings = [];

    async function loadBookings() {
      try {
        const response = await fetch(`${API_URL}/bookings`);
        const data = await response.json();
        
        if (data.success) {
          allBookings = data.bookings;
          filteredBookings = allBookings;
          renderBookings();
          updateStats();
          populatePropertyFilter();
        }
      } catch (error) {
        console.error('Failed to load bookings:', error);
        document.getElementById('bookingsBody').innerHTML = `
          <tr>
            <td colspan="10" class="empty-state">
              <div>Failed to load bookings. Make sure the backend server is running.</div>
            </td>
          </tr>
        `;
      }
    }

    function renderBookings() {
      const tbody = document.getElementById('bookingsBody');
      
      if (filteredBookings.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="10" class="empty-state">
              <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="12" y="16" width="40" height="36" rx="2"/>
                <path d="M20 16 L20 12 M44 16 L44 12"/>
                <path d="M12 24 L52 24"/>
              </svg>
              <div>No bookings found</div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = filteredBookings.map(booking => `
        <tr>
          <td><strong>${booking.id}</strong></td>
          <td>${booking.property || booking.propertyName || 'Property ' + booking.propertyId}</td>
          <td>${booking.guestName || booking.name || 'N/A'}</td>
          <td>${new Date(booking.checkin).toLocaleDateString('en-IN')}</td>
          <td>${new Date(booking.checkout).toLocaleDateString('en-IN')}</td>
          <td>${booking.guests || 'N/A'}</td>
          <td><strong>${booking.total || 'N/A'}</strong></td>
          <td><span class="status-badge status-${booking.status}">${booking.status}</span></td>
          <td>${booking.source || 'Website'}</td>
          <td>
            <div class="actions">
              <button class="btn-small secondary" onclick="viewBooking('${booking.id}')">View</button>
              ${booking.status === 'confirmed' ? `<button class="btn-small secondary" onclick="cancelBooking('${booking.id}')">Cancel</button>` : ''}
            </div>
          </td>
        </tr>
      `).join('');
    }

    function updateStats() {
      const total = allBookings.length;
      const thisMonth = allBookings.filter(b => {
        const bookingDate = new Date(b.createdAt || b.checkin);
        const now = new Date();
        return bookingDate.getMonth() === now.getMonth() && 
               bookingDate.getFullYear() === now.getFullYear();
      }).length;

      const revenue = allBookings.reduce((sum, b) => {
        if (b.total && typeof b.total === 'string') {
          const amount = parseInt(b.total.replace(/[^0-9]/g, ''));
          return sum + (isNaN(amount) ? 0 : amount);
        }
        return sum;
      }, 0);

      const upcoming = allBookings.filter(b => {
        const checkin = new Date(b.checkin);
        const now = new Date();
        return checkin > now && b.status === 'confirmed';
      }).length;

      document.getElementById('totalBookings').textContent = total;
      document.getElementById('monthBookings').textContent = thisMonth;
      document.getElementById('totalRevenue').textContent = '₹' + revenue.toLocaleString();
      document.getElementById('upcomingCheckins').textContent = upcoming;
    }

    function populatePropertyFilter() {
      const properties = [...new Set(allBookings.map(b => b.property || b.propertyName))];
      const select = document.getElementById('propertyFilter');
      
      properties.forEach(prop => {
        if (prop) {
          const option = document.createElement('option');
          option.value = prop;
          option.textContent = prop;
          select.appendChild(option);
        }
      });
    }

    function filterBookings() {
      const status = document.getElementById('statusFilter').value;
      const property = document.getElementById('propertyFilter').value;
      const date = document.getElementById('dateFilter').value;
      const search = document.getElementById('searchFilter').value.toLowerCase();

      filteredBookings = allBookings.filter(booking => {
        if (status !== 'all' && booking.status !== status) return false;
        if (property !== 'all' && booking.property !== property && booking.propertyName !== property) return false;
        if (date && booking.checkin !== date) return false;
        if (search && !(booking.guestName || booking.name || '').toLowerCase().includes(search)) return false;
        return true;
      });

      renderBookings();
    }

    async function syncAirbnb(propertyId) {
      try {
        const response = await fetch(`${API_URL}/sync-airbnb/${propertyId}`, {
          method: 'POST'
        });
        const data = await response.json();
        
        if (data.success) {
          alert(`✅ ${data.message}`);
          document.getElementById('lastSync').textContent = new Date().toLocaleString('en-IN');
          refreshData();
        } else {
          alert('❌ Sync failed: ' + data.error);
        }
      } catch (error) {
        alert('❌ Sync failed: ' + error.message);
      }
    }

    async function syncAllAirbnb() {
      for (let i = 1; i <= 15; i++) {
        await syncAirbnb(i);
      }
    }

    function viewBooking(id) {
      const booking = allBookings.find(b => b.id === id);
      alert(JSON.stringify(booking, null, 2));
    }

    function cancelBooking(id) {
      if (confirm('Are you sure you want to cancel this booking?')) {
        // Implement cancellation logic
        alert('Cancellation feature - implement refund logic here');
      }
    }

    function exportToCSV() {
      const headers = ['Booking ID', 'Property', 'Guest', 'Check-in', 'Check-out', 'Guests', 'Amount', 'Status'];
      const rows = filteredBookings.map(b => [
        b.id,
        b.property || b.propertyName,
        b.guestName || b.name,
        new Date(b.checkin).toLocaleDateString('en-IN'),
        new Date(b.checkout).toLocaleDateString('en-IN'),
        b.guests,
        b.total,
        b.status
      ]);

      const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bookings-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    function refreshData() {
      loadBookings();
    }

    // Load on page load
    loadBookings();
  </script>
</body>
</html>
